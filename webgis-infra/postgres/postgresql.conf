# ============================================================
# PostgreSQL 16 + PostGIS — Tuning para 4vCPU / 8GB RAM
# Referência: documento "Infraestrutura WebGIS em 2026"
# Hardware: Vultr São Paulo CPX41 equivalente
# ============================================================

# ── CONEXÕES ──────────────────────────────────────────────
# PgBouncer gerencia as conexões reais; aqui o limite é baixo
max_connections = 100          # PgBouncer se conecta com pool de 30-50

# ── MEMÓRIA ───────────────────────────────────────────────
# shared_buffers = 25% da RAM (8GB → 2GB)
shared_buffers = 2GB

# work_mem para operações espaciais complexas (256MB-1GB recomendado)
# Cuidado: pode ser multiplicado por conexões paralelas
work_mem = 256MB

# Memória para operações de manutenção (VACUUM, CREATE INDEX)
maintenance_work_mem = 512MB

# Cache efetivo do SO estimado (~75% da RAM)
effective_cache_size = 6GB

# ── WORKERS PARALELOS ──────────────────────────────────────
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ── WAL / CHECKPOINT ──────────────────────────────────────
# Reduz I/O — queries GIS são predominantemente leitura
wal_level = replica
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9
wal_buffers = 64MB

# ── PLANNER ────────────────────────────────────────────────
# NVMe SSD — custo de random I/O é baixo
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# ── QUERY PLANNER ──────────────────────────────────────────
default_statistics_target = 100
# Para queries espaciais complexas, aumentar por coluna:
# ALTER TABLE geometries ALTER COLUMN geom SET STATISTICS 500;

# ── LOGGING (mínimo em produção) ───────────────────────────
log_min_duration_statement = 1000   # Log queries > 1s
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0

# ── AUTOVACUUM ─────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# ── PostGIS ESPECÍFICO ─────────────────────────────────────
# Necessário para ST_AsMVT (Martin tile server)
max_locks_per_transaction = 128

# ── TIMEZONE ───────────────────────────────────────────────
timezone = 'America/Sao_Paulo'
log_timezone = 'America/Sao_Paulo'

# ── LOCALE ─────────────────────────────────────────────────
lc_messages = 'en_US.UTF-8'
lc_monetary = 'pt_BR.UTF-8'
lc_numeric = 'pt_BR.UTF-8'
lc_time = 'pt_BR.UTF-8'
